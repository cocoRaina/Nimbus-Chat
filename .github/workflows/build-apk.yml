name: Build Android APK

# Builds a release APK every time you push to main (or tag with v*).
# Signed with a stable keystore from secrets so re-installs are treated
# as upgrades (data preserved, no re-login).

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm deps
        run: npm ci

      - name: Build web assets
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Sync Capacitor → Android
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Decode google-services.json for FCM
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
            echo "google-services.json written"
          else
            echo "No GOOGLE_SERVICES_JSON secret — FCM push won't work in this build"
          fi

      - name: Decode + verify signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "No ANDROID_KEYSTORE_BASE64 secret set — will build unsigned debug APK"
            echo "have_keystore=no" >> "$GITHUB_ENV"
            exit 0
          fi

          # Pre-flight: Java's PKCS12 PBE rejects non-ASCII passwords with
          # "InvalidKeySpecException: Password is not ASCII", but only when
          # the private key is actually decrypted — keytool -list reads
          # metadata only and won't catch it. Catch it here instead of
          # burning 2min in gradle.
          check_ascii() {
            local name="$1" value="$2"
            if [ -z "$value" ]; then
              echo "::error::$name secret is empty"
              return 1
            fi
            # Strip printable ASCII (\40..\176). Anything left is non-ASCII
            # or a control char (incl. a stray trailing newline from the secret).
            if [ -n "$(LC_ALL=C printf '%s' "$value" | LC_ALL=C tr -d '\40-\176')" ]; then
              echo "::error::$name contains non-ASCII or control characters (smart quotes, accented letters, trailing newline, etc.)."
              echo "::error::Java PKCS12 signing will fail with 'Password is not ASCII'."
              echo "::error::Use only basic ASCII (a-z A-Z 0-9 and basic punctuation)."
              return 1
            fi
          }
          check_ascii ANDROID_KEYSTORE_PASSWORD "$KEYSTORE_PASSWORD" || exit 1
          check_ascii ANDROID_KEY_PASSWORD "$KEY_PASSWORD" || exit 1

          # base64 from GH secrets sometimes has CR/LF or trailing whitespace; --ignore-garbage skips those.
          printf '%s' "$KEYSTORE_BASE64" | base64 -d --ignore-garbage > android/release.keystore
          ls -la android/release.keystore

          # Verify the keystore is parseable, the storepass works, and the alias exists.
          if ! keytool -list -keystore android/release.keystore \
                       -storepass "$KEYSTORE_PASSWORD" \
                       -alias "${KEY_ALIAS:-nimbus}" > /tmp/keytool.out 2>&1; then
            echo "::error::Keystore verification failed. Most common causes:"
            echo "  - ANDROID_KEYSTORE_BASE64 has whitespace/newlines or isn't valid base64"
            echo "  - ANDROID_KEYSTORE_PASSWORD is wrong"
            echo "  - ANDROID_KEY_ALIAS doesn't match the alias inside the keystore"
            echo "keytool output (passwords redacted by keytool):"
            sed -E 's/(password|Password)=[^ ]+/\1=***/g' /tmp/keytool.out
            exit 1
          fi

          # keytool -list above only reads metadata. Force a private-key
          # fetch via -certreq so a wrong/empty key password fails here
          # (not 2min into gradle's signing step).
          if ! keytool -certreq -keystore android/release.keystore \
                       -storepass "$KEYSTORE_PASSWORD" \
                       -alias "${KEY_ALIAS:-nimbus}" \
                       -keypass "$KEY_PASSWORD" \
                       -file /tmp/csr.test > /tmp/keypass.out 2>&1; then
            echo "::error::Key password verification failed — ANDROID_KEY_PASSWORD doesn't match the key in the keystore."
            echo "::error::(For PKCS12 keystores, the key password is usually the same as the store password.)"
            sed -E 's/(password|Password)=[^ ]+/\1=***/g' /tmp/keypass.out
            exit 1
          fi
          rm -f /tmp/csr.test

          echo "Keystore OK — store + key passwords verified, alias '${KEY_ALIAS:-nimbus}' found."
          echo "have_keystore=yes" >> "$GITHUB_ENV"

      - name: Build APK
        shell: bash
        run: |
          set -o pipefail
          cd android
          if [ "$have_keystore" = "yes" ]; then
            echo "Building signed RELEASE APK"
            ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee ../gradle-build.log
          else
            echo "No keystore — falling back to DEBUG APK (data won't persist across installs!)"
            ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee ../gradle-build.log
          fi
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload gradle log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: |
            gradle-build.log
            android/app/build/reports/**
          if-no-files-found: ignore

      - name: Rename APK
        run: |
          mkdir -p out
          SUFFIX="${{ github.ref_name }}-$(date +%Y%m%d-%H%M)"
          RELEASE_APK=android/app/build/outputs/apk/release/app-release.apk
          UNSIGNED_APK=android/app/build/outputs/apk/release/app-release-unsigned.apk
          DEBUG_APK=android/app/build/outputs/apk/debug/app-debug.apk
          if [ -f "$RELEASE_APK" ]; then
            cp "$RELEASE_APK" "out/nimbus-chat-${SUFFIX}.apk"
          elif [ -f "$UNSIGNED_APK" ]; then
            echo "::warning::Release APK is unsigned — re-installs won't preserve data. Check keystore secrets."
            cp "$UNSIGNED_APK" "out/nimbus-chat-${SUFFIX}-unsigned.apk"
          elif [ -f "$DEBUG_APK" ]; then
            cp "$DEBUG_APK" "out/nimbus-chat-${SUFFIX}-debug.apk"
          else
            echo "::error::No APK found in build outputs"
            find android/app/build/outputs -name '*.apk' || true
            exit 1
          fi

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: nimbus-chat-apk
          path: out/nimbus-chat-*.apk
          if-no-files-found: error

      - name: Create / update GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/nimbus-chat-*.apk
          generate_release_notes: true
