name: Build Android APK

# Builds a release APK every time you push to main (or tag with v*).
# Signed with a stable keystore from secrets so re-installs are treated
# as upgrades (data preserved, no re-login).

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm deps
        run: npm ci

      - name: Build web assets
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Sync Capacitor → Android
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Decode signing keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/release.keystore
          ls -la android/release.keystore

      - name: Build APK
        run: |
          cd android
          if [ -f release.keystore ]; then
            echo "Building signed RELEASE APK"
            ./gradlew assembleRelease --no-daemon
          else
            echo "No keystore — falling back to DEBUG APK (data won't persist across installs!)"
            ./gradlew assembleDebug --no-daemon
          fi
        env:
          ANDROID_KEYSTORE_FILE: release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Rename APK
        run: |
          mkdir -p out
          SUFFIX="${{ github.ref_name }}-$(date +%Y%m%d-%H%M)"
          if [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
            cp android/app/build/outputs/apk/release/app-release.apk \
               out/nimbus-chat-${SUFFIX}.apk
          else
            cp android/app/build/outputs/apk/debug/app-debug.apk \
               out/nimbus-chat-${SUFFIX}.apk
          fi

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: nimbus-chat-apk
          path: out/nimbus-chat-*.apk
          if-no-files-found: error

      - name: Create / update GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/nimbus-chat-*.apk
          generate_release_notes: true
