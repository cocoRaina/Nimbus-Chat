apply plugin: 'com.android.application'

// CI decodes ANDROID_KEYSTORE_BASE64 secret into android/release.keystore
// before running gradle. If absent (local debug, or missing CI secret),
// we skip the signing config entirely — AGP 8 rejects empty configs.
def releaseKeystore = rootProject.file("release.keystore")
def hasReleaseKeystore = releaseKeystore.exists()

android {
    namespace = "com.cocoraina.nimbuschat"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.cocoraina.nimbuschat"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    // Clawd crab desktop-pet sprite frames live in their own resource dir
    // (res-crab) to keep the hundreds of frame PNGs out of the main res/.
    // They still merge into R.drawable, so widgets reference them normally.
    sourceSets {
        main {
            res.srcDirs += 'src/main/res-crab'
        }
    }
    if (hasReleaseKeystore) {
        signingConfigs {
            release {
                storeFile releaseKeystore
                storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD") ?: ""
                keyAlias System.getenv("ANDROID_KEY_ALIAS") ?: "nimbus"
                keyPassword System.getenv("ANDROID_KEY_PASSWORD") ?: ""
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (hasReleaseKeystore) {
                signingConfig signingConfigs.release
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    // WorkManager: periodic background poll for server-written spontaneous
    // proactive messages → raises a LOCAL notification with no push service
    // (FCM/HMS), so it works on GMS-less phones (Huawei etc.).
    implementation "androidx.work:work-runtime:2.9.1"
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

// ListenableFuture lives on two different classpaths here and they disagree:
//
//   • COMPILE classpath: only the empty placeholder
//     `listenablefuture:9999.0-empty-to-avoid-conflict-with-guava` is visible
//     (pulled transitively via WorkManager). Its huge version wins conflict
//     resolution but the jar has NO classes, so our Worker subclass
//     (ProactivePollWorker) can't see ListenableFuture → javac fails.
//   • RUNTIME classpath: a Capacitor plugin already drags in full
//     guava-31.1-android, which DOES contain ListenableFuture.
//
// So we only need to patch the COMPILE side: force the real interface-only
// 1.0 artifact there. We must NOT touch the runtime side — adding 1.0 there
// too would duplicate the class against full Guava and fail dexing
// (CheckDuplicateClasses). Scope the force to *CompileClasspath only.
configurations.configureEach { cfg ->
    if (cfg.name.toLowerCase().endsWith("compileclasspath")) {
        cfg.resolutionStrategy.force "com.google.guava:listenablefuture:1.0"
    }
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
